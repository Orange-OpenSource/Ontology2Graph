site_name: Ontology2Graph Documentation...
site_description: Synthetic Knowledge Graph Generation with LLMs
site_author: Philippe Dooze, Lionel Tailhardat, Ovidiu Pascal

### REPOSITORY ###
repo_url: https://github.com/Orange-OpenSource/Ontology2Graph
repo_name: Ontology2Graph

### THEME CONFIGURATION ###
theme:
  name: material

  # Brand Assets
  #logo: assets/images/pygraft-gen-logo.svg        # Top-left nav logo (inside site)
  #favicon: assets/images/pygraft-gen-logo.png     # Browser tab + Google search

  # Color Palette - Uses W3C/Semantic Web brand colors via custom CSS
  palette:
    # Light mode
    - scheme: default
      primary: blue          # Will be overridden with W3C blue via CSS
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: blue          # Will be overridden with W3C blue via CSS
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    # Top Navigation
    - navigation.tabs          # Converts top-level nav to horizontal tabs
    - navigation.tabs.sticky   # Keeps tabs visible when scrolling

    # Left Sidebar Navigation
    - navigation.sections      # Sections in nav are expandable
    - navigation.expand        # Auto-expand nav sections
    - navigation.indexes       # Makes section index pages clickable
    - navigation.top           # "Back to top" button appears on scroll

    # Right Sidebar (Table of Contents)
    - toc.follow               # TOC follows scroll position

    # Code Block Features
    - content.code.copy        # Copy button on code blocks
    - content.code.annotate    # Allow annotations in code blocks

    # Content Features
    - content.tabs.link        # Enable linked content tabs

    # Performance Features
    - navigation.instant       # Fast page loads
    - navigation.tracking      # URL updates on scroll

### Navigation ###
nav:
  - Home: index.md
  - System Architecture:
    - Modules Overview: system-architecture/modules_overview.md
  - User Guide: 
    - Installation: user-guide/installation.md
    - Quick Start: user-guide/quickstart.md
  - Modules:
    - Knowledge Graph Generation : modules/generate_ttl.md
    - Graph Consolidation : modules/merge_ttl.md
    - Visualization and Analysis : modules/display_graphs.md
    - Common Utilities : modules/utils_common.md

### Plugins ###
plugins:
  - git-revision-date-localized:
      enable_creation_date: true

### Extensions ###
markdown_extensions:
  - toc:
      permalink: true
  - codehilite
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

### Custom CSS ###
extra_css:
  - stylesheets/extra.css
